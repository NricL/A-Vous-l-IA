services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avoulia-backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      # Dossier de documents à indexer au lancement (PDF, TXT, MD, XLSX)
      - ./documents:/app/documents:ro
    env_file:
      - ./backend/.env
    environment:
      - CHROMA_PERSIST_DIR=/app/data/chroma
      # Indexation au démarrage : contenu de /app/documents (dossier ./documents sur l'hôte)
      - INDEX_PATH=/app/documents
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: avoulia-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
