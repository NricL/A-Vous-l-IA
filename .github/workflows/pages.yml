name: Deploy frontend to GitHub Pages
on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/pages.yml']
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://avoulia-backend.purpleocean-980317d1.francecentral.azurecontainerapps.io/api/v1
        run: npx vite build --base=/A-Vous-l-IA/
      - name: SPA fallback and nojekyll
        working-directory: frontend
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4