server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://avoulia-backend.purpleocean-980317d1.francecentral.azurecontainerapps.io;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host avoulia-backend.purpleocean-980317d1.francecentral.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Désactiver le buffering pour le streaming (SSE) du chat
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
